<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Реєстрація</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <main class="mx-auto flex min-h-screen max-w-6xl items-center justify-center px-4">
    <section class="w-full max-w-md rounded-2xl bg-white p-8 shadow-xl">
      <h1 class="text-2xl font-semibold">Реєстрація</h1>
      <p class="mt-2 text-sm text-slate-600">Створіть акаунт для входу через ЕЦП.</p>
      <form method="post" class="mt-6 space-y-4">
        {{ csrf_input }}
        <div>
          <label class="mb-1 block text-sm font-medium">Логін</label>
          <input name="username" type="text" required class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
        </div>
        <div>
          <label class="mb-1 block text-sm font-medium">Email</label>
          <input name="email" type="email" required class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
        </div>
        <div>
          <label class="mb-1 block text-sm font-medium">Пароль</label>
          <input name="password" type="password" required class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
        </div>
        <div>
          <label class="mb-1 block text-sm font-medium">Підтвердіть пароль</label>
          <input name="password_confirm" type="password" required class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
        </div>
        <button type="submit" class="w-full rounded-lg bg-slate-900 px-4 py-2.5 text-sm font-semibold text-white hover:bg-slate-700">
          Зареєструватись
        </button>
      </form>
      <p class="mt-4 text-center text-sm text-slate-600">
        Вже маєте акаунт? <a href="{{ url('login') }}" class="font-semibold">Увійти</a>
      </p>
    </section>
  </main>
  {% include 'partials/footer.html' %}
</body>
</html>
