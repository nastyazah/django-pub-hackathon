<!DOCTYPE html>
<html lang="uk" class="overflow-x-hidden">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ЕЦП підпис</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen overflow-x-hidden bg-slate-100 text-slate-900 antialiased md:h-screen md:overflow-hidden">
  <div class="min-h-screen pb-24 md:h-full md:pb-28">
  <main class="mx-auto flex min-h-screen max-w-6xl items-center justify-center px-4 py-6 md:h-full md:py-10">
    <section class="w-full max-w-md rounded-2xl bg-white p-6 shadow-xl shadow-slate-300/60 sm:p-8">

      <div class="mb-6 flex items-center gap-3">
        <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-slate-900 text-white text-lg">🔑</div>
        <div>
          <h1 class="text-xl font-semibold sm:text-2xl">Підтвердження через ЕЦП</h1>
          <p class="text-xs text-slate-500 mt-0.5">Крок 2 з 2 — завантажте файли підпису</p>
        </div>
      </div>

      {% if messages %}
        {% for message in messages %}
          <div class="mb-4 rounded-lg border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}

      <form action="{{ url('ecp-login') }}" method="post" enctype="multipart/form-data" class="space-y-4">
        {% if csrf_input is defined %}
          {{ csrf_input }}
        {% endif %}

        <div>
          <label for="signature" class="mb-1 block text-sm font-medium text-slate-700">
            Файл підпису
            <span class="ml-1 text-xs text-slate-400 font-normal">.bin / .p7s</span>
          </label>
          <input
            id="signature"
            name="signature"
            type="file"
            required
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none ring-emerald-400 transition focus:ring focus:border-emerald-400 file:mr-3 file:rounded-md file:border-0 file:bg-slate-100 file:px-3 file:py-1 file:text-xs file:font-semibold file:text-slate-700 hover:file:bg-slate-200"
          >
        </div>

        <div>
          <label for="certificate" class="mb-1 block text-sm font-medium text-slate-700">
            Сертифікат
            <span class="ml-1 text-xs text-slate-400 font-normal">.cer / .pem</span>
          </label>
          <input
            id="certificate"
            name="certificate"
            type="file"
            required
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none ring-emerald-400 transition focus:ring focus:border-emerald-400 file:mr-3 file:rounded-md file:border-0 file:bg-slate-100 file:px-3 file:py-1 file:text-xs file:font-semibold file:text-slate-700 hover:file:bg-slate-200"
          >
        </div>

        <div>
          <label for="signed_data" class="mb-1 block text-sm font-medium text-slate-700">
            Підписані дані
            <span class="ml-1 text-xs text-slate-400 font-normal">.bin</span>
          </label>
          <input
            id="signed_data"
            name="signed_data"
            type="file"
            required
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none ring-emerald-400 transition focus:ring focus:border-emerald-400 file:mr-3 file:rounded-md file:border-0 file:bg-slate-100 file:px-3 file:py-1 file:text-xs file:font-semibold file:text-slate-700 hover:file:bg-slate-200"
          >
        </div>

        <button
          type="submit"
          class="inline-flex w-full items-center justify-center gap-2 rounded-lg bg-slate-900 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-slate-700 active:scale-[.98]"
        >
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
          Підтвердити підпис
        </button>
      </form>

      <div class="mt-4 text-center text-sm text-slate-600">
        <a href="{{ url('login') }}" class="font-semibold text-slate-900 hover:text-slate-700 transition underline underline-offset-2">
          ← Повернутися до входу
        </a>
      </div>
    </section>
  </main>
  </div>
  {% include 'partials/footer.html' %}
</body>
</html>
