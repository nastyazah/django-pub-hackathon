<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Реєстрація успішна</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <main class="mx-auto flex min-h-screen max-w-6xl items-center justify-center px-4 py-6">
    <section class="w-full max-w-lg rounded-2xl bg-white p-8 shadow-xl">
      <h1 class="text-2xl font-semibold">Реєстрацію завершено!</h1>
      <p class="mt-2 text-sm text-slate-600">
        Акаунт <span class="font-semibold text-slate-900">{{ username }}</span> створено успішно.
      </p>

      <div class="mt-4 rounded-lg border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-800">
        Завантажте приватний ключ зараз — він доступний лише один раз!
      </div>

      <div class="mt-6 flex flex-col gap-3">
        <a href="{{ url('download-private-key') }}"
          class="inline-flex w-full items-center justify-center rounded-lg bg-emerald-600 px-4 py-3 text-sm font-semibold text-white hover:bg-emerald-700">
          Завантажити приватний ключ (.pem)
        </a>
        <a href="{{ url('login') }}"
          class="inline-flex w-full items-center justify-center rounded-lg bg-slate-900 px-4 py-2.5 text-sm font-semibold text-white hover:bg-slate-700">
          Перейти до входу
        </a>
      </div>

      <p class="mt-4 text-xs text-slate-500 text-center">
        Збережіть ключ у надійному місці. Без нього вхід через ЕЦП неможливий.
      </p>
    </section>
  </main>
  {% include 'partials/footer.html' %}
</body>
</html>
